name: molluscai

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: molluscai-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-mollusc}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mollusc_dev}
      POSTGRES_DB: ${POSTGRES_DB:-molluscai}
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - molluscai-postgres-data:/var/lib/postgresql/data
      - ./infra/postgres/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-mollusc} -d ${POSTGRES_DB:-molluscai}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: molluscai-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6380}:6379"
    volumes:
      - molluscai-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    container_name: molluscai-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "${MINIO_API_PORT:-9002}:9000"
      - "${MINIO_CONSOLE_PORT:-9003}:9001"
    volumes:
      - "${MINIO_DATA_PATH:-molluscai-minio-data}:/data"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: molluscai-backend:latest
    container_name: molluscai-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      POSTGRES_HOST: "postgres"
      POSTGRES_PORT: "5432"
      POSTGRES_USER: ${POSTGRES_USER:-mollusc}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mollusc_dev}
      POSTGRES_DB: ${POSTGRES_DB:-molluscai}
      REDIS_URL: "redis://redis:6379/0"
      CELERY_BROKER_URL: "redis://redis:6379/0"
      CELERY_RESULT_BACKEND: "redis://redis:6379/0"
      MINIO_ENDPOINT: "minio:9000"
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-replace-me-with-a-secure-random-secret}
      JWT_REFRESH_SECRET_KEY: ${JWT_REFRESH_SECRET_KEY:-replace-me-with-another-secure-secret}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-replace-me-with-a-32-byte-hex-key}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      SILICONFLOW_API_KEY: ${SILICONFLOW_API_KEY:-}
      ZHIPU_API_KEY: ${ZHIPU_API_KEY:-}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000,http://localhost:8080}
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  celery-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: molluscai-celery-worker:latest
    container_name: molluscai-celery-worker
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      POSTGRES_HOST: "postgres"
      POSTGRES_PORT: "5432"
      POSTGRES_USER: ${POSTGRES_USER:-mollusc}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mollusc_dev}
      POSTGRES_DB: ${POSTGRES_DB:-molluscai}
      REDIS_URL: "redis://redis:6379/0"
      CELERY_BROKER_URL: "redis://redis:6379/0"
      CELERY_RESULT_BACKEND: "redis://redis:6379/0"
      MINIO_ENDPOINT: "minio:9000"
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      SILICONFLOW_API_KEY: ${SILICONFLOW_API_KEY:-}
      ZHIPU_API_KEY: ${ZHIPU_API_KEY:-}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-}
    volumes:
      - ./backend:/app
    command: celery -A app.tasks.celery_app worker --loglevel=info --concurrency=2

  # celery-beat is disabled — beat_schedule={} means no periodic tasks.
  # The stale celerybeat-schedule DBM file was causing auto-resume of old
  # schedules across container restarts.  Uncomment only when re-adding schedules.
  # celery-beat:
  #   build:
  #     context: ./backend
  #     dockerfile: Dockerfile
  #   image: molluscai-celery-beat:latest
  #   container_name: molluscai-celery-beat
  #   restart: unless-stopped
  #   depends_on:
  #     postgres:
  #       condition: service_healthy
  #     redis:
  #       condition: service_healthy
  #   environment:
  #     POSTGRES_HOST: "postgres"
  #     POSTGRES_PORT: "5432"
  #     POSTGRES_USER: ${POSTGRES_USER:-mollusc}
  #     POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mollusc_dev}
  #     POSTGRES_DB: ${POSTGRES_DB:-molluscai}
  #     REDIS_URL: "redis://redis:6379/0"
  #     CELERY_BROKER_URL: "redis://redis:6379/0"
  #     CELERY_RESULT_BACKEND: "redis://redis:6379/0"
  #   volumes:
  #     - ./backend:/app
  #   command: celery -A app.tasks.celery_app beat --loglevel=info

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: molluscai-frontend:latest
    container_name: molluscai-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    volumes:
      - ./frontend/nginx.conf:/etc/nginx/conf.d/default.conf:ro

# external: true on network + volumes keeps them alive across compose
# project recreation and daemon restarts. ./dev prod-up creates them.
networks:
  default:
    name: molluscai-net
    external: true

volumes:
  molluscai-postgres-data:
    name: molluscai-postgres-data
    external: true
  molluscai-redis-data:
    name: molluscai-redis-data
    external: true
  molluscai-minio-data:
    name: molluscai-minio-data
    external: true
