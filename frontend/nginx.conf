server {
    listen 80;
    server_name localhost;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript;
    gzip_min_length 1000;

    resolver 127.0.0.11 valid=30s ipv6=off;

    location /api/ {
        set $backend_upstream backend:8000;
        # When proxy_pass target contains a variable, nginx does NOT auto-append
        # the matched URI tail. We must pass $request_uri (original URI + query)
        # explicitly, otherwise every request collapses to GET /api/ at backend.
        proxy_pass http://$backend_upstream$request_uri;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /minio/ {
        set $minio_upstream minio:9000;
        # Strip the /minio/ prefix and proxy what's left to MinIO's root.
        rewrite ^/minio/(.*)$ /$1 break;
        proxy_pass http://$minio_upstream;
        proxy_set_header Host $host;
    }

    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }
}
